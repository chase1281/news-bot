name: Daily News Briefing

on:
  schedule:
    # 매일 UTC 23:00 (KST 08:00) 실행
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run 모드로 실행 (카카오톡 전송 없이 로그만 출력)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew bootJar -x test

      - name: Run news briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          NEWSBOT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: java -jar build/libs/newsBot-0.0.1-SNAPSHOT.jar
