spring.application.name=newsBot
spring.main.web-application-type=none

# OpenAI
openai.api-key=${OPENAI_API_KEY:test-placeholder}
openai.model=gpt-4o-mini
openai.max-tokens=1000

# Kakao
kakao.client-id=${KAKAO_CLIENT_ID:placeholder}
kakao.refresh-token=${KAKAO_REFRESH_TOKEN:placeholder}

# Runtime
newsbot.dry-run=${NEWSBOT_DRY_RUN:false}
